name: Create Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v0.2.0)"
        required: true

jobs:
  create_tag:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}